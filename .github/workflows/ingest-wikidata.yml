name: ingest-wikidata

# Monthly brand registry refresh from Wikidata SPARQL.
# Requires repo secret: DATABASE_URL (persistent Postgres).

on:
  schedule:
    - cron: "0 2 1 * *" # 1st of month, 07:30 IST
  workflow_dispatch: {}

concurrency:
  group: ingest-wikidata
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scripts/ingest-wikidata-brands.ts
