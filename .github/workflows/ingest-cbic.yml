name: ingest-cbic

# Weekly HSN -> GST rate refresh from the committed CBIC table.
# Requires repo secret: DATABASE_URL (persistent Postgres).

on:
  schedule:
    - cron: "0 1 * * 1" # Mondays 06:30 IST
  workflow_dispatch: {}

concurrency:
  group: ingest-cbic
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scripts/ingest-cbic-gst.ts
