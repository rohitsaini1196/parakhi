name: ingest-agmarknet

# Daily mandi commodity prices from data.gov.in (Agmarknet).
# Requires repo secrets: DATABASE_URL (persistent Postgres), DATA_GOV_IN_API_KEY.

on:
  schedule:
    - cron: "30 0 * * *" # 06:00 IST daily
  workflow_dispatch: {}

concurrency:
  group: ingest-agmarknet
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scripts/ingest-agmarknet.ts
